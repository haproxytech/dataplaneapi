        'default':
          $ref: '../../../../models/common/responses/models.yaml#/components/responses/DefaultError'
      x-codegen-request-body-name: data
    delete:
      summary: Delete a TCP Request Rule
      description: Deletes a TCP Request Rule configuration by its index from the specified {{ .ParentType }}.
      operationId: deleteTCPRequestRule{{ .ParentType }}
      tags:
        - TCPRequestRule
      parameters:
        - name: index
          in: path
          description: TCP Request Rule Index
          required: true
          schema:
            type: integer
        - name: parent_name
          in: path
          description: Parent name
          required: true
          schema:
            type: string
            pattern: '^[^\r\n<>*;$#&{}"]+$'
        - name: transaction_id
          in: query
          description: ID of the transaction where we want to add the operation. Cannot be used when version is specified.
          required: false
