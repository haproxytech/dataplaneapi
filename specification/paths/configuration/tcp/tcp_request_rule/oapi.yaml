            Configuration-Version:
              description: Configuration file version
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/tcp_request_rule'
        '404':
          $ref: '../../../../models/common/responses/models.yaml#/components/responses/NotFound'
        'default':
          $ref: '../../../../models/common/responses/models.yaml#/components/responses/DefaultError'
    post:
      summary: Add a new TCP Request Rule
      description: Adds a new TCP Request Rule of the specified type in the specified {{ .ParentType }}.
      operationId: createTCPRequestRule{{ .ParentType }}
      tags:
        - TCPRequestRule
      parameters:
        - name: index
          in: path
          description: TCP Request Rule Index
          required: true
