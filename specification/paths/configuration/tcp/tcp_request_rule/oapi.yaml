        'default':
          $ref: '../../../../models/common/responses/models.yaml#/components/responses/DefaultError'
      x-codegen-request-body-name: data
    put:
      summary: Replace a TCP Request Rule
      description: Replaces a TCP Request Rule configuration by its index in the specified {{ .ParentType }}.
      operationId: replaceTCPRequestRule{{ .ParentType }}
      tags:
        - TCPRequestRule
      parameters:
        - name: index
          in: path
