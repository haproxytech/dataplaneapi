        'default':
          $ref: '../../../models/common/responses/models.yaml#/components/responses/DefaultError'
      x-codegen-request-body-name: data
    delete:
      summary: Delete a Stick Rule
      description: Deletes a Stick Rule configuration by its index from the specified backend.
      operationId: deleteStickRule
      tags:
        - StickRule
      parameters:
        - name: index
          in: path
          description: Stick Rule Index
          required: true
          schema:
            type: integer
        - name: parent_name
          in: path
          description: Parent backend name
          required: true
          schema:
            type: string
            pattern: '^[^\r\n<>*;$#&{}"]+$'
        - name: transaction_id
          in: query
          description: ID of the transaction where we want to add the operation. Cannot be used when version is specified.
          required: false
