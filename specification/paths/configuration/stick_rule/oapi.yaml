        'default':
          $ref: '../../../models/common/responses/models.yaml#/components/responses/DefaultError'
      x-codegen-request-body-name: data
    put:
      summary: Replace a Stick Rule
      description: Replaces a Stick Rule configuration by its index in the specified backend.
      operationId: replaceStickRule
      tags:
        - StickRule
      parameters:
        - name: index
          in: path
          description: Stick Rule Index
          required: true
          schema:
            type: integer
        - name: parent_name
          in: path
          description: Parent backend name
          required: true
          schema:
            type: string
            pattern: '^[^\r\n<>*;$#&{}"]+$'
        - name: transaction_id
