            pattern: '^[^\r\n<>*;$#&{}"]+$'
        - name: transaction_id
          in: query
          description: ID of the transaction where we want to add the operation. Cannot be used when version is specified.
          required: false
          schema:
            type: string
      responses:
        '200':
          description: Successful operation
          headers:
            Configuration-Version:
              description: Configuration file version
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/quic_initial_rule'
        '404':
          $ref: '../../../../models/common/responses/models.yaml#/components/responses/NotFound'
        'default':
          $ref: '../../../../models/common/responses/models.yaml#/components/responses/DefaultError'
    post:
      summary: Add a new QUIC Initial Rule
      description: Adds a new QUIC Initial Rule of the specified type in the specified {{ .ParentType }}.
      operationId: createQUICInitialRule{{ .ParentType }}
      tags:
        - QUICInitialRule
      parameters:
        - name: index
          in: path
          description: QUIC Initial Rule Index
          required: true
          schema:
            type: integer
        - name: parent_name
