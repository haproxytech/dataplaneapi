        '404':
          $ref: '../../../../models/common/responses/models.yaml#/components/responses/NotFound'
        'default':
          $ref: '../../../../models/common/responses/models.yaml#/components/responses/DefaultError'
      x-codegen-request-body-name: data
    delete:
      summary: Delete a QUIC Initial Rule
      description: Deletes a QUIC Initial Rule configuration by its index from the specified {{ .ParentType }}.
      operationId: deleteQUICInitialRule{{ .ParentType }}
      tags:
        - QUICInitialRule
      parameters:
        - name: index
          in: path
          description: QUIC Initial Rule Index
          required: true
          schema:
            type: integer
        - name: parent_name
          in: path
          description: Parent name
          required: true
          schema:
            type: string
            pattern: '^[^\r\n<>*;$#&{}"]+$'
        - name: transaction_id
          in: query
          description: ID of the transaction where we want to add the operation. Cannot be used when version is specified.
          required: false
