        'default':
          $ref: '../../../../models/common/responses/models.yaml#/components/responses/DefaultError'
      x-codegen-request-body-name: data
    put:
      summary: Replace a QUIC Initial Rule
      description: Replaces a QUIC Initial Rule configuration by its index in the specified {{ .ParentType }}.
      operationId: replaceQUICInitialRule{{ .ParentType }}
      tags:
        - QUICInitialRule
      parameters:
