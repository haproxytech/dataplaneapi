openapi: 3.0.1
info:
  title: HAProxy Data Plane API - Server Switching Rule
  description: An API for managing HAProxy Server Switching Rule entries.
servers:
  - url: /v3
components:
  schemas:
    server_switching_rule:
      type: object
      x-go-type: models.ServerSwitchingRule
      x-go-type-import:
        path: github.com/haproxytech/client-native/v6/models
    server_switching_rules:
      type: array
      items:
        $ref: '#/components/schemas/server_switching_rule'
      x-go-type: models.ServerSwitchingRules
      x-go-type-import:
        path: github.com/haproxytech/client-native/v6/models
paths:
  /services/haproxy/configuration/backends/{parent_name}/server_switching_rules:
    get:
      summary: Return an array of all Server Switching Rules
      description: Returns all Server Switching Rules that are configured in specified backend.
      operationId: getServerSwitchingRules
      tags:
        - ServerSwitchingRule
      parameters:
        - name: parent_name
          in: path
          description: Parent backend name
          required: true
          schema:
            type: string
            pattern: '^[^\r\n<>*;$#&{}"]+$'
        - name: transaction_id
          in: query
          description: ID of the transaction where we want to add the operation. Cannot be used when version is specified.
          required: false
          schema:
            type: string
      responses:
        '200':
          description: Successful operation
          headers:
            Configuration-Version:
              description: Configuration file version
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/server_switching_rules'
        'default':
          $ref: '../../../models/common/responses/models.yaml#/components/responses/DefaultError'
    put:
      summary: Replace a Server Switching Rule list
      description: Replaces a whole list of Server Switching Rules with the list given in parameter for the specified backend.
      operationId: replaceServerSwitchingRules
      tags:
        - ServerSwitchingRule
      parameters:
        - name: parent_name
          in: path
          description: Parent backend name
          required: true
          schema:
            type: string
            pattern: '^[^\r\n<>*;$#&{}"]+$'
        - name: transaction_id
          in: query
          description: ID of the transaction where we want to add the operation. Cannot be used when version is specified.
          required: false
          schema:
            type: string
        - name: version
          in: query
          description: Version used for checking configuration version. Cannot be used when transaction is specified, transaction has its own version.
          required: false
          schema:
            type: integer
        - name: force_reload
          in: query
          description: If set, do a force reload, do not wait for the configured reload-delay. Cannot be used when transaction is specified, as changes in transaction are not applied directly to configuration.
          required: false
          schema:
            type: boolean
            default: false
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/server_switching_rules'
      responses:
        '202':
          description: Configuration change accepted and reload requested
          headers:
            Reload-ID:
              description: ID of the requested reload
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/server_switching_rules'
        '200':
          description: All Server Switching Rules replaced
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/server_switching_rules'
        '400':
          $ref: '../../../models/common/responses/models.yaml#/components/responses/BadRequest'
        'default':
          $ref: '../../../models/common/responses/models.yaml#/components/responses/DefaultError'
