openapi: 3.0.1
info:
  title: HAProxy Data Plane API - Crt Store
  description: An API for managing HAProxy Crt Store and Crt Load entries.
servers:
  - url: /v3
components:
  schemas:
    crt_store:
      type: object
      x-go-type: models.CrtStore
      x-go-type-import:
        path: github.com/haproxytech/client-native/v6/models
    crt_stores:
      type: array
      items:
        $ref: '#/components/schemas/crt_store'
      x-go-type: models.CrtStores
      x-go-type-import:
        path: github.com/haproxytech/client-native/v6/models
    crt_load:
      type: object
      x-go-type: models.CrtLoad
      x-go-type-import:
        path: github.com/haproxytech/client-native/v6/models
    crt_loads:
      type: array
      items:
        $ref: '#/components/schemas/crt_load'
      x-go-type: models.CrtLoads
      x-go-type-import:
        path: github.com/haproxytech/client-native/v6/models
paths:
  /services/haproxy/configuration/crt_stores:
    get:
      summary: Return an array of crt stores
      description: Returns all crt stores that are configured.
      operationId: getCrtStores
      tags:
        - CrtStore
      parameters:
        - name: transaction_id
          in: query
          description: ID of the transaction where we want to add the operation. Cannot be used when version is specified.
          required: false
          schema:
            type: string
        - name: full_section
          in: query
          description: Indicates if the action affects the specified child resources as well
          required: false
          schema:
            type: boolean
            default: false
      responses:
        '200':
          description: Successful operation
          headers:
            Configuration-Version:
              description: Configuration file version
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/crt_stores'
        'default':
          $ref: '../../../models/common/responses/models.yaml#/components/responses/DefaultError'
    post:
      summary: Add a new crt store
      description: Adds a new crt store to the configuration.
      operationId: createCrtStore
      tags:
        - CrtStore
      parameters:
        - name: transaction_id
          in: query
          description: ID of the transaction where we want to add the operation. Cannot be used when version is specified.
          required: false
          schema:
            type: string
        - name: version
          in: query
          description: Version used for checking configuration version. Cannot be used when transaction is specified, transaction has its own version.
          required: false
          schema:
            type: integer
        - name: force_reload
          in: query
          description: If set, do a force reload, do not wait for the configured reload-delay. Cannot be used when transaction is specified, as changes in transaction are not applied directly to configuration.
          required: false
          schema:
            type: boolean
            default: false
        - name: full_section
          in: query
          description: Indicates if the action affects the specified child resources as well
          required: false
          schema:
            type: boolean
            default: false
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/crt_store'
      responses:
        '202':
          description: Configuration change accepted and reload requested
          headers:
            Reload-ID:
              description: ID of the requested reload
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/crt_store'
        '201':
          description: Crt Store created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/crt_store'
        '409':
          $ref: '../../../models/common/responses/models.yaml#/components/responses/AlreadyExists'
        '400':
          $ref: '../../../models/common/responses/models.yaml#/components/responses/BadRequest'
        'default':
          $ref: '../../../models/common/responses/models.yaml#/components/responses/DefaultError'
      x-codegen-request-body-name: data
