    put:
      summary: Replace a crt store
      description: Replaces a crt store configuration by its name.
      operationId: editCrtStore
      tags:
        - CrtStore
      parameters:
        - name: name
          in: path
          description: Crt store name
          required: true
          schema:
            type: string
        - name: transaction_id
          in: query
          description: ID of the transaction where we want to add the operation. Cannot be used when version is specified.
          required: false
          schema:
            type: string
        - name: version
