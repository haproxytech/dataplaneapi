openapi: 3.0.1
info:
  title: HAProxy Data Plane API - Mailers
  description: An API for managing HAProxy mailers section and mailer entry configurations.
servers:
  - url: /v3
components:
  schemas:
    mailers_section:
      type: object
      x-go-type: models.MailersSection
      x-go-type-import:
        path: github.com/haproxytech/client-native/v6/models
    mailers_sections:
      type: array
      items:
        $ref: '#/components/schemas/mailers_section'
      x-go-type: models.MailersSections
      x-go-type-import:
        path: github.com/haproxytech/client-native/v6/models
    mailer_entry:
      type: object
      x-go-type: models.MailerEntry
      x-go-type-import:
        path: github.com/haproxytech/client-native/v6/models
    mailer_entries:
      type: array
      items:
        $ref: '#/components/schemas/mailer_entry'
      x-go-type: models.MailerEntries
