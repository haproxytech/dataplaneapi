              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/users'
        'default':
          $ref: '../../../models/common/responses/models.yaml#/components/responses/DefaultError'
    post:
      summary: Add a user
      description: Adds a new user to the specified userlist.
      operationId: createUser
      tags:
        - User
      parameters:
        - name: userlist
          in: query
          description: Parent userlist name
          required: true
          schema:
            type: string
        - name: transaction_id
          in: query
          description: ID of the transaction where we want to add the operation. Cannot be used when version is specified.
          required: false
