openapi: 3.0.1
info:
  title: HAProxy Data Plane API - Userlist
  description: An API for managing HAProxy userlist and user configurations.
servers:
  - url: /v3
components:
  schemas:
    userlist:
      type: object
      x-go-type: models.Userlist
      x-go-type-import:
        path: github.com/haproxytech/client-native/v6/models
    userlists:
      type: array
      items:
        $ref: '#/components/schemas/userlist'
      x-go-type: models.Userlists
      x-go-type-import:
        path: github.com/haproxytech/client-native/v6/models
    user:
      type: object
      x-go-type: models.User
      x-go-type-import:
        path: github.com/haproxytech/client-native/v6/models
    users:
      type: array
      items:
        $ref: '#/components/schemas/user'
      x-go-type: models.Users
      x-go-type-import:
        path: github.com/haproxytech/client-native/v6/models
paths:
  /services/haproxy/configuration/userlists:
    get:
      summary: Return an array of userlists
      description: Returns an array of all configured userlists.
      operationId: getUserlists
      tags:
        - Userlist
      parameters:
        - name: transaction_id
          in: query
          description: ID of the transaction where we want to add the operation. Cannot be used when version is specified.
          required: false
          schema:
            type: string
        - name: full_section
          in: query
          description: Indicates if the action affects the specified child resources as well
          required: false
          schema:
            type: boolean
            default: false
      responses:
        '200':
          description: Successful operation
          headers:
            Configuration-Version:
              description: Configuration file version
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/userlists'
        'default':
          $ref: '../../../models/common/responses/models.yaml#/components/responses/DefaultError'
    post:
      summary: Add a userlist
      description: Adds a new userlist to the configuration file.
      operationId: createUserlist
      tags:
        - Userlist
      parameters:
        - name: transaction_id
          in: query
          description: ID of the transaction where we want to add the operation. Cannot be used when version is specified.
          required: false
          schema:
            type: string
        - name: version
          in: query
          description: Version used for checking configuration version. Cannot be used when transaction is specified, transaction has its own version.
          required: false
          schema:
            type: integer
        - name: force_reload
          in: query
          description: If set, do a force reload, do not wait for the configured reload-delay. Cannot be used when transaction is specified, as changes in transaction are not applied directly to configuration.
          required: false
          schema:
            type: boolean
            default: false
        - name: full_section
          in: query
          description: Indicates if the action affects the specified child resources as well
          required: false
          schema:
            type: boolean
            default: false
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/userlist'
      responses:
        '202':
          description: Configuration change accepted and reload requested
          headers:
            Reload-ID:
              description: ID of the requested reload
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/userlist'
        '201':
          description: Userlist created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/userlist'
        '409':
          $ref: '../../../models/common/responses/models.yaml#/components/responses/AlreadyExists'
        '400':
          $ref: '../../../models/common/responses/models.yaml#/components/responses/BadRequest'
        'default':
          $ref: '../../../models/common/responses/models.yaml#/components/responses/DefaultError'
      x-codegen-request-body-name: data

  /services/haproxy/configuration/userlists/{name}:
    get:
      summary: Return a userlist
      description: Returns one userlist configuration by its name.
      operationId: getUserlist
      tags:
        - Userlist
      parameters:
        - name: name
          in: path
          description: Userlist name
          required: true
          schema:
            type: string
        - name: transaction_id
          in: query
          description: ID of the transaction where we want to add the operation. Cannot be used when version is specified.
          required: false
          schema:
            type: string
        - name: full_section
          in: query
          description: Indicates if the action affects the specified child resources as well
          required: false
          schema:
            type: boolean
            default: false
      responses:
        '200':
          description: Successful operation
          headers:
            Configuration-Version:
              description: Configuration file version
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/userlist'
        '404':
          $ref: '../../../models/common/responses/models.yaml#/components/responses/NotFound'
        'default':
          $ref: '../../../models/common/responses/models.yaml#/components/responses/DefaultError'
    delete:
      summary: Delete a userlist
      description: Deletes a userlist from the configuration by its name.
      operationId: deleteUserlist
      tags:
        - Userlist
      parameters:
        - name: name
          in: path
          description: Userlist name
          required: true
          schema:
            type: string
        - name: transaction_id
          in: query
          description: ID of the transaction where we want to add the operation. Cannot be used when version is specified.
          required: false
          schema:
            type: string
        - name: version
          in: query
          description: Version used for checking configuration version. Cannot be used when transaction is specified, transaction has its own version.
          required: false
          schema:
            type: integer
        - name: force_reload
          in: query
          description: If set, do a force reload, do not wait for the configured reload-delay. Cannot be used when transaction is specified, as changes in transaction are not applied directly to configuration.
          required: false
          schema:
            type: boolean
            default: false
      responses:
        '202':
          description: Configuration change accepted and reload requested
          headers:
            Reload-ID:
              description: ID of the requested reload
              schema:
                type: string
        '204':
          description: Userlist deleted
        '404':
          $ref: '../../../models/common/responses/models.yaml#/components/responses/NotFound'
        'default':
          $ref: '../../../models/common/responses/models.yaml#/components/responses/DefaultError'

  /services/haproxy/configuration/users:
    get:
      summary: Return an array of users
      description: Returns an array of all users belonging to the specified userlist.
      operationId: getUsers
      tags:
        - User
      parameters:
        - name: userlist
          in: query
          description: Parent userlist name
          required: true
          schema:
            type: string
        - name: transaction_id
          in: query
          description: ID of the transaction where we want to add the operation. Cannot be used when version is specified.
          required: false
          schema:
            type: string
      responses:
        '200':
          description: Successful operation
          headers:
            Configuration-Version:
