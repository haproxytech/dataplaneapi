        '404':
          $ref: '../../../models/common/responses/models.yaml#/components/responses/NotFound'
        'default':
          $ref: '../../../models/common/responses/models.yaml#/components/responses/DefaultError'
      x-codegen-request-body-name: data
    delete:
      summary: Delete a Declare Capture
      description: Deletes a Declare Capture configuration by its index from the specified frontend.
      operationId: deleteDeclareCapture
      tags:
        - DeclareCapture
      parameters:
        - name: index
          in: path
          description: Capture Index
          required: true
          schema:
            type: integer
        - name: parent_name
          in: path
          description: Parent frontend name
          required: true
          schema:
            type: string
            pattern: '^[^\r\n<>*;$#&{}"]+$'
        - name: transaction_id
          in: query
          description: ID of the transaction where we want to add the operation. Cannot be used when version is specified.
          required: false
          schema:
            type: string
        - name: version
          in: query
          description: Version used for checking configuration version. Cannot be used when transaction is specified, transaction has its own version.
          required: false
