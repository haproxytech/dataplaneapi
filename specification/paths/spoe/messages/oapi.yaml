openapi: 3.0.1
info:
  title: HAProxy Data Plane API - SPOE Messages
servers:
  - url: /v3
components:
  schemas:
    spoe_message:
      type: object
      x-go-type: models.SpoeMessage
      x-go-type-import:
        path: github.com/haproxytech/client-native/v6/models
    spoe_messages:
      type: array
      items:
        $ref: '#/components/schemas/spoe_message'
      x-go-type: models.SpoeMessages
      x-go-type-import:
        path: github.com/haproxytech/client-native/v6/models
paths:
  /services/haproxy/spoe/spoe_files/{parent_name}/scopes/{scope_name}/messages:
    get:
      summary: Return an array of spoe messages in one scope
      description: Returns an array of all configured spoe messages in one scope.
      operationId: getAllSpoeMessage
      tags:
        - Spoe
      parameters:
        - name: parent_name
          in: path
          description: SPOE file name
          required: true
          schema:
            type: string
            pattern: '^[^\r\n<>*;$#&{}"]+$'
        - name: scope_name
          in: path
          description: Spoe scope name
          required: true
          schema:
            type: string
        - name: transaction_id
          in: query
          description: ID of the transaction where we want to add the operation. Cannot be used when version is specified.
          required: false
          schema:
            type: string
      responses:
        '200':
          description: Successful operation
          headers:
            Configuration-Version:
              description: Spoe configuration file version
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/spoe_messages'
        'default':
          $ref: '../../../models/common/responses/models.yaml#/components/responses/DefaultError'
    post:
      summary: Add a new spoe message to scope
      description: Adds a new spoe message to the spoe scope.
      operationId: createSpoeMessage
      tags:
        - Spoe
      parameters:
        - name: parent_name
          in: path
          description: SPOE file name
          required: true
          schema:
            type: string
            pattern: '^[^\r\n<>*;$#&{}"]+$'
        - name: scope_name
          in: path
          description: Spoe scope name
          required: true
          schema:
            type: string
        - name: transaction_id
          in: query
          description: ID of the transaction where we want to add the operation. Cannot be used when version is specified.
          required: false
          schema:
            type: string
        - name: version
          in: query
          description: Version used for checking configuration version. Cannot be used when transaction is specified.
          required: false
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/spoe_message'
      responses:
        '201':
          description: Spoe message created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/spoe_message'
        '409':
          $ref: '../../../models/common/responses/models.yaml#/components/responses/AlreadyExists'
        '400':
          $ref: '../../../models/common/responses/models.yaml#/components/responses/BadRequest'
        'default':
          $ref: '../../../models/common/responses/models.yaml#/components/responses/DefaultError'
      x-codegen-request-body-name: data
  /services/haproxy/spoe/spoe_files/{parent_name}/scopes/{scope_name}/messages/{name}:
    get:
      summary: Return a spoe message
      description: Returns one spoe message configuration in SPOE scope.
      operationId: getSpoeMessage
      tags:
        - Spoe
      parameters:
        - name: parent_name
          in: path
          description: SPOE file name
          required: true
          schema:
            type: string
            pattern: '^[^\r\n<>*;$#&{}"]+$'
        - name: scope_name
          in: path
          description: Spoe scope name
          required: true
          schema:
            type: string
        - name: name
          in: path
          description: Spoe message name
          required: true
          schema:
            type: string
        - name: transaction_id
          in: query
          description: ID of the transaction where we want to add the operation. Cannot be used when version is specified.
          required: false
          schema:
            type: string
      responses:
        '200':
          description: Successful operation
          headers:
            Configuration-Version:
              description: Spoe configuration file version
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/spoe_message'
        '404':
          $ref: '../../../models/common/responses/models.yaml#/components/responses/NotFound'
        'default':
          $ref: '../../../models/common/responses/models.yaml#/components/responses/DefaultError'
    put:
      summary: Replace a spoe message
      description: Replaces a spoe message configuration in one SPOE scope.
      operationId: replaceSpoeMessage
      tags:
        - Spoe
      parameters:
        - name: parent_name
          in: path
          description: SPOE file name
          required: true
          schema:
            type: string
            pattern: '^[^\r\n<>*;$#&{}"]+$'
        - name: scope_name
          in: path
          description: Spoe scope name
          required: true
          schema:
            type: string
        - name: name
          in: path
          description: Spoe message name
          required: true
          schema:
            type: string
        - name: transaction_id
          in: query
          description: ID of the transaction where we want to add the operation. Cannot be used when version is specified.
          required: false
          schema:
            type: string
        - name: version
          in: query
          description: Version used for checking configuration version. Cannot be used when transaction is specified.
          required: false
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/spoe_message'
      responses:
        '200':
          description: Spoe message replaced
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/spoe_message'
        '400':
          $ref: '../../../models/common/responses/models.yaml#/components/responses/BadRequest'
        '404':
          $ref: '../../../models/common/responses/models.yaml#/components/responses/NotFound'
        'default':
          $ref: '../../../models/common/responses/models.yaml#/components/responses/DefaultError'
      x-codegen-request-body-name: data
    delete:
      summary: Delete a spoe message
      description: Deletes a spoe message from the SPOE scope.
      operationId: deleteSpoeMessage
      tags:
        - Spoe
      parameters:
        - name: parent_name
          in: path
          description: SPOE file name
          required: true
          schema:
            type: string
            pattern: '^[^\r\n<>*;$#&{}"]+$'
        - name: scope_name
          in: path
          description: Spoe scope name
          required: true
          schema:
            type: string
        - name: name
          in: path
          description: Spoe message name
          required: true
          schema:
            type: string
        - name: transaction_id
          in: query
          description: ID of the transaction where we want to add the operation. Cannot be used when version is specified.
          required: false
          schema:
            type: string
        - name: version
          in: query
          description: Version used for checking configuration version. Cannot be used when transaction is specified.
          required: false
          schema:
            type: integer
      responses:
        '204':
          description: Spoe message deleted
        '404':
          $ref: '../../../models/common/responses/models.yaml#/components/responses/NotFound'
        'default':
          $ref: '../../../models/common/responses/models.yaml#/components/responses/DefaultError'
