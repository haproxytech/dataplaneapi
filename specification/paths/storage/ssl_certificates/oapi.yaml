openapi: 3.0.1
info:
  title: HAProxy Data Plane API - Storage SSL Certificates
servers:
  - url: /v3
components:
  schemas:
    ssl_certificate:
      type: object
      x-go-type: models.SslCertificate
      x-go-type-import:
        path: github.com/haproxytech/client-native/v6/models
    ssl_certificates:
      type: array
      items:
        $ref: '#/components/schemas/ssl_certificate'
      x-go-type: models.SslCertificates
      x-go-type-import:
        path: github.com/haproxytech/client-native/v6/models
paths:
  /services/haproxy/storage/ssl_certificates:
    get:
      summary: Return all available SSL certificates on disk
      description: Returns all available SSL certificates on disk.
      operationId: getAllStorageSSLCertificates
      tags:
        - Storage
      responses:
        '200':
          description: Successful operation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ssl_certificates'
        '404':
          $ref: '../../../models/common/responses/models.yaml#/components/responses/NotFound'
        'default':
          $ref: '../../../models/common/responses/models.yaml#/components/responses/DefaultError'
    post:
      summary: Create SSL certificate
      description: Creates SSL certificate.
      operationId: createStorageSSLCertificate
      tags:
        - Storage
      parameters:
        - name: skip_reload
          in: query
          description: If set, no reload will be initiated after config change
          required: false
          schema:
            type: boolean
            default: false
        - name: force_reload
          in: query
          description: If set, do a force reload, do not wait for the configured reload-delay.
          required: false
          schema:
            type: boolean
            default: false
      requestBody:
        content:
          multipart/form-data:
            encoding:
              file_upload:
                contentType: text/plain
            schema:
              type: object
              properties:
                file_upload:
                  type: string
                  format: binary
                  description: The SSL certificate to upload
      responses:
        '201':
          description: SSL certificate created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ssl_certificate'
        '202':
          description: SSL certificate created requested
          headers:
            Reload-ID:
              description: ID of the requested reload
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ssl_certificate'
        '409':
          $ref: '../../../models/common/responses/models.yaml#/components/responses/AlreadyExists'
        '400':
          $ref: '../../../models/common/responses/models.yaml#/components/responses/BadRequest'
        'default':
          $ref: '../../../models/common/responses/models.yaml#/components/responses/DefaultError'
      x-codegen-request-body-name: file_upload
  /services/haproxy/storage/ssl_certificates/{name}:
    get:
      summary: Return one SSL certificate from disk
      description: Returns one SSL certificate from disk.
      operationId: getOneStorageSSLCertificate
      tags:
        - Storage
      parameters:
        - name: name
          in: path
          description: SSL certificate name
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Successful operation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ssl_certificate'
        '404':
          $ref: '../../../models/common/responses/models.yaml#/components/responses/NotFound'
        'default':
          $ref: '../../../models/common/responses/models.yaml#/components/responses/DefaultError'
    put:
      summary: Replace SSL certificates on disk
      description: Replaces SSL certificate on disk.
      operationId: replaceStorageSSLCertificate
      tags:
        - Storage
      parameters:
        - name: name
          in: path
          description: SSL certificate name
          required: true
          schema:
            type: string
        - name: skip_reload
          in: query
          description: If set, no reload will be initiated after config change
          required: false
          schema:
            type: boolean
            default: false
        - name: force_reload
          in: query
          description: If set, do a force reload, do not wait for the configured reload-delay.
          required: false
          schema:
            type: boolean
            default: false
      requestBody:
        required: true
        content:
          text/plain:
            schema:
              type: string
      responses:
        '200':
          description: SSL certificate replaced
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ssl_certificate'
        '202':
          description: SSL certificate replaced and reload requested
          headers:
            Reload-ID:
              description: ID of the requested reload
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ssl_certificate'
        '400':
          $ref: '../../../models/common/responses/models.yaml#/components/responses/BadRequest'
        '404':
          $ref: '../../../models/common/responses/models.yaml#/components/responses/NotFound'
        'default':
          $ref: '../../../models/common/responses/models.yaml#/components/responses/DefaultError'
      x-codegen-request-body-name: data
    delete:
      summary: Delete SSL certificate from disk
      description: Deletes SSL certificate from disk.
      operationId: deleteStorageSSLCertificate
      tags:
        - Storage
      parameters:
        - name: name
          in: path
          description: SSL certificate name
          required: true
          schema:
            type: string
        - name: skip_reload
          in: query
          description: If set, no reload will be initiated after config change
          required: false
          schema:
            type: boolean
            default: false
        - name: force_reload
          in: query
          description: If set, do a force reload, do not wait for the configured reload-delay.
          required: false
          schema:
            type: boolean
            default: false
      responses:
        '202':
          description: SSL certificate deleted and reload requested
          headers:
            Reload-ID:
              description: ID of the requested reload
              schema:
                type: string
        '204':
          description: SSL certificate deleted
        '404':
          $ref: '../../../models/common/responses/models.yaml#/components/responses/NotFound'
        'default':
          $ref: '../../../models/common/responses/models.yaml#/components/responses/DefaultError'
