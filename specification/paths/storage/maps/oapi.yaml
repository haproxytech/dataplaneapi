openapi: 3.0.1
info:
  title: HAProxy Data Plane API - Storage Maps
servers:
  - url: /v3
components:
  schemas:
    map:
      type: object
      x-go-type: models.Map
      x-go-type-import:
        path: github.com/haproxytech/client-native/v6/models
    maps:
      type: array
      items:
        $ref: '#/components/schemas/map'
      x-go-type: models.Maps
      x-go-type-import:
        path: github.com/haproxytech/client-native/v6/models
paths:
  /services/haproxy/storage/maps:
    get:
      summary: Return a list of all managed map files
      description: Returns a list of all managed map files
      operationId: getAllStorageMapFiles
      tags:
        - Storage
      responses:
        '200':
          description: Successful operation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/maps'
        '404':
          $ref: '../../../models/common/responses/models.yaml#/components/responses/NotFound'
        'default':
          $ref: '../../../models/common/responses/models.yaml#/components/responses/DefaultError'
    post:
      summary: Creates a managed storage map file with its entries
      description: Creates a managed storage map file with its entries.
      operationId: createStorageMapFile
      tags:
        - Storage
      requestBody:
        content:
          multipart/form-data:
            encoding:
              file_upload:
                contentType: text/plain
            schema:
              type: object
              properties:
                file_upload:
                  type: string
                  format: binary
                  description: The map file contents
      responses:
        '201':
          description: Map file created with its entries
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/map'
        '409':
          $ref: '../../../models/common/responses/models.yaml#/components/responses/AlreadyExists'
        '400':
          $ref: '../../../models/common/responses/models.yaml#/components/responses/BadRequest'
        'default':
          $ref: '../../../models/common/responses/models.yaml#/components/responses/DefaultError'
      x-codegen-request-body-name: file_upload
  /services/haproxy/storage/maps/{name}:
    get:
      summary: Return the contents of one managed map file from disk
      description: Returns the contents of one managed map file from disk
      operationId: getOneStorageMap
      tags:
        - Storage
      parameters:
        - name: name
          in: path
          description: Map file storage_name
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Successful operation
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary
        '404':
          $ref: '../../../models/common/responses/models.yaml#/components/responses/NotFound'
        'default':
          $ref: '../../../models/common/responses/models.yaml#/components/responses/DefaultError'
    put:
      summary: Replace contents of a managed map file on disk
      description: Replaces the contents of a managed map file on disk
      operationId: replaceStorageMapFile
      tags:
        - Storage
      parameters:
        - name: name
          in: path
          description: Map file storage_name
          required: true
          schema:
            type: string
        - name: skip_reload
          in: query
          description: If set, no reload will be initiated after config change
          required: false
          schema:
            type: boolean
            default: false
        - name: force_reload
          in: query
          description: If set, do a force reload, do not wait for the configured reload-delay.
          required: false
          schema:
            type: boolean
            default: false
      requestBody:
        required: true
        content:
          text/plain:
            schema:
              type: string
      responses:
        '202':
          description: Configuration change accepted and reload requested
          headers:
            Reload-ID:
              description: ID of the requested reload
              schema:
                type: string
        '204':
          description: Map file replaced
        '400':
          $ref: '../../../models/common/responses/models.yaml#/components/responses/BadRequest'
        '404':
          $ref: '../../../models/common/responses/models.yaml#/components/responses/NotFound'
        'default':
          $ref: '../../../models/common/responses/models.yaml#/components/responses/DefaultError'
      x-codegen-request-body-name: data
    delete:
      summary: Deletes a managed map file from disk
      description: Deletes a managed map file from disk.
      operationId: deleteStorageMap
      tags:
        - Storage
      parameters:
        - name: name
          in: path
          description: Map file storage_name
          required: true
          schema:
            type: string
      responses:
        '204':
          description: Map file deleted
        '404':
          $ref: '../../../models/common/responses/models.yaml#/components/responses/NotFound'
        'default':
          $ref: '../../../models/common/responses/models.yaml#/components/responses/DefaultError'
